<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chiranth Portfolio</title>
</head>
<body>
     <h2>Contact Form</h2>
        <form>
            <label for="fullname">Name:</label>
            <input type="text" id="fullname" placeholder="Enter your name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required><br><br>
            <label for="subject">Subject:</label>
            <select id="subject">
                <option>Choose an option</option>
                <option>I want to hire you</option>
                <option>I want to collaborate</option>
                <option>Other</option>
            </select><br><br>
            <label for="message">Message:</label> <br>
            <textarea id="message "placeholder="type a message" rows="4" cols="40"></textarea><br><br>
            <button type="submit">Submit 📩</button>
            <button type="reset">Reset</button>
        </form>
    </section>
</body>
</html>
