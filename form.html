<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="name">Name</label>
        <input type="text" placeholder="enter the name " id="name" name = "fullname"><br><br>
        <label for="email">Email</label>
        <input type="email" placeholder="enter the email id" id="email" email="email id"><br><br>
        <label for="number">Phone number</label>
        <input type="text" placeholder="Phone number" name="number" id="number"><br><br>
        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="18" max="100">
        <!--radio button-->
        <p> Gender</p>
        <input type="radio" name="gender" id="male">
        <label for="gender">Male</label>
        <input type="radio" name="gender" id="female">
        <label for="gender">Female</label>
        <!--checkbox-->
        <p>technologies</p>
        <input type="checkbox" name="html" id="html">
        <label for="html">HTML</label><br>
        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label><br>
        <!--dropdown-->
        <label for="country">COUNTRY</label>
        <select name="country" id="country">
            <option value="India">India</option>
            <option value="UK">UK</option>
            <option value="USA">USA</option><br>
        </select><br>
        <!--TEXT BOX-->
        <label for="text">Message</label>
        <textarea name="text" id="Message"></textarea><br>
        <!--UPLOAD FILE-->
        <label for="file">Upload resume</label>
        <input type="file" name="file" id="resume"><br>
        <!--DOB-->
        <label for="dob">DOB</label>
        <input type="date" name="dob" id="dob"><br>
        <button type="submit"> Sumbit</button>
        <button type="reset"> Reset </button>
    </form>
</body>
</html>
